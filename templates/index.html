<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x-download</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 x-download</h1>
            <p class="subtitle" id="subtitle">简单快速的视频下载工具</p>
            <div class="lang-switch">
                <button onclick="switchLang('zh')" id="langZh" class="lang-btn active">中文</button>
                <button onclick="switchLang('en')" id="langEn" class="lang-btn">English</button>
            </div>
        </header>

        <main>
            <div class="download-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="粘贴视频链接（支持 YouTube、抖音、B站等）"
                        autocomplete="off"
                    >
                    <button onclick="getVideoInfo()" id="infoBtn">
                        获取信息
                    </button>
                </div>

                <div id="videoInfo" class="video-info" style="display: none;">
                    <div class="info-card">
                        <img id="thumbnail" src="" alt="视频封面" class="thumbnail">
                        <div class="info-details">
                            <h3 id="videoTitle"></h3>
                            <p id="videoUploader"></p>
                            <p id="videoDuration"></p>
                        </div>
                    </div>

                    <div class="format-section">
                        <label id="selectQuality">选择画质：</label>
                        <select id="formatSelect">
                            <option value="" id="bestQuality">最佳画质（推荐）</option>
                        </select>
                    </div>

                    <button onclick="startDownload()" id="downloadBtn" class="download-btn">
                        开始下载
                    </button>
                </div>

                <div id="progress" class="progress" style="display: none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <p id="progressText">正在下载...</p>
                </div>

                <div id="result" class="result" style="display: none;"></div>
            </div>

            <div class="status-section">
                <h3 id="statusTitle">服务状态</h3>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="label" id="statusLabel">状态</span>
                        <span class="value" id="statusValue">检查中...</span>
                    </div>
                    <div class="status-item">
                        <span class="label" id="currentFilesLabel">当前文件数</span>
                        <span class="value" id="fileCount">-</span>
                    </div>
                    <div class="status-item">
                        <span class="label" id="maxFilesLabel">最大保留数</span>
                        <span class="value" id="maxFiles">-</span>
                    </div>
                </div>
            </div>

            <div class="help-section">
                <h3 id="helpTitle">使用说明</h3>
                <ul>
                    <li id="help1">粘贴视频链接，点击"获取信息"查看视频详情</li>
                    <li id="help2">选择合适的画质，点击"开始下载"</li>
                    <li id="help3">下载完成后会自动保存到服务器</li>
                    <li id="help4">支持 YouTube、抖音、B站、Twitter 等主流平台</li>
                    <li id="help5">系统会自动清理旧文件，保持最新的 {max_files} 个视频</li>
                </ul>
            </div>
        </main>

        <footer>
            <p id="footerText"> Powered by yt-dlp | x-download v1.0</p>
        </footer>
    </div>

    <script>
        let currentLang = '{{ lang }}';
        let translations = {};

        // 获取翻译文本
        async function loadTranslations(lang) {
            try {
                const response = await fetch(`/api/i18n?lang=${lang}`);
                translations = await response.json();
                updatePageText();
            } catch (error) {
                console.error('Failed to load translations:', error);
            }
        }

        // 更新页面文本
        function updatePageText() {
            const t = translations;
            if (!t.title) return;

            document.title = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('urlInput').placeholder = t.placeholder;
            document.getElementById('infoBtn').textContent = t.get_info;
            document.getElementById('selectQuality').textContent = t.select_quality;
            document.getElementById('bestQuality').textContent = t.best_quality;
            document.getElementById('downloadBtn').textContent = t.download;
            document.getElementById('statusTitle').textContent = t.status;
            document.getElementById('statusLabel').textContent = t.status;
            document.getElementById('currentFilesLabel').textContent = t.current_files;
            document.getElementById('maxFilesLabel').textContent = t.max_files;
            document.getElementById('helpTitle').textContent = t.help_title;
            document.getElementById('help1').textContent = t.help_1;
            document.getElementById('help2').textContent = t.help_2;
            document.getElementById('help3').textContent = t.help_3;
            document.getElementById('help4').textContent = t.help_4;
            document.getElementById('help5').textContent = t.help_5.replace('{max}', '{{ max_files }}');
            document.getElementById('footerText').textContent = t.footer;

            // 更新语言按钮状态
            document.getElementById('langZh').classList.toggle('active', currentLang === 'zh');
            document.getElementById('langEn').classList.toggle('active', currentLang === 'en');

            // 更新 HTML lang 属性
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        // 切换语言
        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('x-download-lang', lang);
            
            // 更新 URL 参数
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.pushState({}, '', url);
            
            loadTranslations(lang);
            checkStatus();
        }

        // 格式化时长
        function formatDuration(seconds) {
            if (!seconds) return translations.duration_unknown || '未知';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            const t = translations;
            if (h > 0) return `${h}${t.hour || '小时'}${m}${t.minute || '分'}`;
            if (m > 0) return `${m}${t.minute || '分'}${s}${t.second || '秒'}`;
            return `${s}${t.second || '秒'}`;
        }

        // 获取视频信息
        async function getVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert(translations.enter_url || '请输入视频链接');
                return;
            }

            const btn = document.getElementById('infoBtn');
            btn.disabled = true;
            btn.textContent = translations.getting || '获取中...';

            try {
                const response = await fetch(`${window.location.origin}/api/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('videoUploader').textContent = `${translations.uploader || '上传者'}: ${data.uploader}`;
                    document.getElementById('videoDuration').textContent = `${translations.duration || '时长'}: ${formatDuration(data.duration)}`;
                    
                    if (data.thumbnail) {
                        document.getElementById('thumbnail').src = data.thumbnail;
                    }
                    
                    document.getElementById('videoInfo').style.display = 'block';
                } else {
                    alert((translations.no_info || '获取视频信息失败') + ': ' + data.error);
                }
            } catch (error) {
                alert((translations.request_failed || '请求失败') + ': ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = translations.get_info || '获取信息';
            }
        }

        // 开始下载
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const formatId = document.getElementById('formatSelect').value;
            
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = translations.downloading || '下载中...';

            const progressDiv = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressDiv.style.display = 'block';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressText.textContent = (translations.downloading_progress || '正在下载...').replace('{pct}', Math.floor(progress));
            }, 500);

            try {
                const response = await fetch(`${window.location.origin}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format: formatId })
                });

                const data = await response.json();
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressText.textContent = translations.download_complete || '下载完成！';

                const resultDiv = document.getElementById('result');
                if (data.success) {
                    const downloadUrl = `/download/${data.file}`;
                    resultDiv.innerHTML = `
                        <div class="success-message">
                            <h4>${translations.download_success || '✓ 下载成功！'}</h4>
                            <p>${translations.file_name || '文件名'}: ${data.file}</p>
                            <p>${translations.file_size || '大小'}: ${(data.size / 1024 / 1024).toFixed(2)} MB</p>
                            <a href="${downloadUrl}" class="download-link-btn" download>⬇️ ${translations.download || '下载文件'}</a>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error-message">
                            <h4>${translations.download_failed || '✗ 下载失败'}</h4>
                            <p>${data.error}</p>
                        </div>
                    `;
                }
                resultDiv.style.display = 'block';

                setTimeout(checkStatus, 2000);
            } catch (error) {
                clearInterval(interval);
                document.getElementById('result').innerHTML = `
                    <div class="error-message">
                        <h4>${translations.request_failed || '✗ 请求失败'}</h4>
                        <p>${error.message}</p>
                    </div>
                `;
                document.getElementById('result').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = translations.download || '开始下载';
            }
        }

        // 检查服务状态
        async function checkStatus() {
            try {
                const response = await fetch(`${window.location.origin}/api/status`);
                const data = await response.json();
                
                const statusText = data.status === 'running' ? (translations.running || '✓ 运行中') : (translations.stopped || '✗ 已停止');
                document.getElementById('statusValue').textContent = statusText;
                document.getElementById('fileCount').textContent = data.files;
                document.getElementById('maxFiles').textContent = data.max_files;
            } catch (error) {
                document.getElementById('statusValue').textContent = translations.connection_failed || '✗ 连接失败';
            }
        }

        // 初始化
        window.onload = function() {
            // 从 localStorage 或 URL 参数获取语言
            const savedLang = localStorage.getItem('x-download-lang');
            const urlLang = new URL(window.location).searchParams.get('lang');
            currentLang = urlLang || savedLang || '{{ lang }}';
            
            loadTranslations(currentLang);
            checkStatus();
            setInterval(checkStatus, 30000);
        };

        // 回车键触发
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getVideoInfo();
            }
        });
    </script>
</body>
</html>
