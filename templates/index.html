<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x-download - 视频下载工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 x-download</h1>
            <p class="subtitle">简单快速的视频下载工具</p>
        </header>

        <main>
            <div class="download-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="粘贴视频链接（支持 YouTube、抖音、B站等）"
                        autocomplete="off"
                    >
                    <button onclick="getVideoInfo()" id="infoBtn">
                        获取信息
                    </button>
                </div>

                <div id="videoInfo" class="video-info" style="display: none;">
                    <div class="info-card">
                        <img id="thumbnail" src="" alt="视频封面" class="thumbnail">
                        <div class="info-details">
                            <h3 id="videoTitle"></h3>
                            <p id="videoUploader"></p>
                            <p id="videoDuration"></p>
                        </div>
                    </div>

                    <div class="format-section">
                        <label>选择画质：</label>
                        <select id="formatSelect">
                            <option value="best">最佳画质（推荐）</option>
                        </select>
                    </div>

                    <button onclick="startDownload()" id="downloadBtn" class="download-btn">
                        开始下载
                    </button>
                </div>

                <div id="progress" class="progress" style="display: none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <p id="progressText">正在下载...</p>
                </div>

                <div id="result" class="result" style="display: none;"></div>
            </div>

            <div class="status-section">
                <h3>服务状态</h3>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="label">状态</span>
                        <span class="value" id="statusValue">检查中...</span>
                    </div>
                    <div class="status-item">
                        <span class="label">当前文件数</span>
                        <span class="value" id="fileCount">-</span>
                    </div>
                    <div class="status-item">
                        <span class="label">最大保留数</span>
                        <span class="value" id="maxFiles">-</span>
                    </div>
                </div>
            </div>

            <div class="help-section">
                <h3>使用说明</h3>
                <ul>
                    <li>粘贴视频链接，点击"获取信息"查看视频详情</li>
                    <li>选择合适的画质，点击"开始下载"</li>
                    <li>下载完成后会自动保存到服务器</li>
                    <li>支持 YouTube、抖音、B站、Twitter 等主流平台</li>
                    <li>系统会自动清理旧文件，保持最新的 {{ max_files }} 个视频</li>
                </ul>
            </div>
        </main>

        <footer>
            <p> Powered by yt-dlp | x-download v1.0</p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 格式化时长
        function formatDuration(seconds) {
            if (!seconds) return '未知';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}小时${m}分`;
            if (m > 0) return `${m}分${s}秒`;
            return `${s}秒`;
        }

        // 获取视频信息
        async function getVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('请输入视频链接');
                return;
            }

            const btn = document.getElementById('infoBtn');
            btn.disabled = true;
            btn.textContent = '获取中...';

            try {
                const response = await fetch(`${API_BASE}/api/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('videoUploader').textContent = `上传者: ${data.uploader}`;
                    document.getElementById('videoDuration').textContent = `时长: ${formatDuration(data.duration)}`;
                    
                    if (data.thumbnail) {
                        document.getElementById('thumbnail').src = data.thumbnail;
                    }
                    
                    document.getElementById('videoInfo').style.display = 'block';
                } else {
                    alert('获取视频信息失败: ' + data.error);
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '获取信息';
            }
        }

        // 开始下载
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const formatId = document.getElementById('formatSelect').value;
            
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = '下载中...';

            const progressDiv = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressDiv.style.display = 'block';

            // 模拟进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressText.textContent = `正在下载... ${Math.floor(progress)}%`;
            }, 500);

            try {
                const response = await fetch(`${API_BASE}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format: formatId })
                });

                const data = await response.json();
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressText.textContent = '下载完成！';

                const resultDiv = document.getElementById('result');
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success-message">
                            <h4>✓ 下载成功！</h4>
                            <p>文件名: ${data.file}</p>
                            <p>大小: ${(data.size / 1024 / 1024).toFixed(2)} MB</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error-message">
                            <h4>✗ 下载失败</h4>
                            <p>${data.error}</p>
                        </div>
                    `;
                }
                resultDiv.style.display = 'block';

                // 刷新状态
                setTimeout(checkStatus, 2000);
            } catch (error) {
                clearInterval(interval);
                document.getElementById('result').innerHTML = `
                    <div class="error-message">
                        <h4>✗ 请求失败</h4>
                        <p>${error.message}</p>
                    </div>
                `;
                document.getElementById('result').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '开始下载';
            }
        }

        // 检查服务状态
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                
                document.getElementById('statusValue').textContent = data.status === 'running' ? '✓ 运行中' : '✗ 已停止';
                document.getElementById('fileCount').textContent = data.files;
                document.getElementById('maxFiles').textContent = data.max_files;
            } catch (error) {
                document.getElementById('statusValue').textContent = '✗ 连接失败';
            }
        }

        // 页面加载时检查状态
        window.onload = function() {
            checkStatus();
            // 每30秒刷新一次状态
            setInterval(checkStatus, 30000);
        };

        // 回车键触发获取信息
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getVideoInfo();
            }
        });
    </script>
</body>
</html>
