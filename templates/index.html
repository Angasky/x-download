<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x-download</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⬇️ x-download</h1>
            <p class="subtitle" id="subtitle">yt-dlp 視頻下載服務 / Video Downloader</p>
        </header>

        <section class="download-section">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="請輸入視頻鏈接 / Enter video URL (YouTube / Bilibili / Twitter / 抖音...)" autocomplete="off">
                <button id="downloadBtn" onclick="startDownload()">開始下載 / Start Download</button>
            </div>
            <p class="notice" id="notice">最多保留 50 個文件，超出自動刪除最早的文件 / Max 50 files retained, oldest auto-deleted when exceeded</p>
        </section>

        <section class="tasks-section">
            <h2>📋 下載任務 / Download Tasks</h2>
            <div id="tasksList">
                <p class="empty" id="emptyMsg">暫無下載任務 / No download tasks</p>
            </div>
        </section>

        <footer>
            <p>Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a> | x-download</p>
        </footer>
    </div>

    <script>
        let maxFiles = 50;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function timeAgo(ts) {
            const diff = Date.now() / 1000 - ts;
            if (diff < 60) return '剛剛 / just now';
            if (diff < 3600) return Math.floor(diff / 60) + '分鐘前 / ' + Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + '小時前 / ' + Math.floor(diff / 3600) + 'h ago';
            const d = new Date(ts * 1000);
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('請輸入鏈接地址 / Please enter a URL');
                return;
            }

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = '正在下載... / Downloading...';

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('urlInput').value = '';
                    refreshTasks();
                } else {
                    alert(data.message || 'Error');
                    btn.disabled = false;
                    btn.textContent = '開始下載 / Start Download';
                }
            } catch (e) {
                alert('網絡錯誤，請稍後重試 / Network error, please try again later');
                btn.disabled = false;
                btn.textContent = '開始下載 / Start Download';
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('確定刪除此文件? / Delete this file?')) return;
            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });
                const data = await res.json();
                if (data.success) {
                    refreshTasks();
                }
            } catch (e) {
                alert('網絡錯誤，請稍後重試 / Network error, please try again');
            }
        }

        async function refreshTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                renderTasks(data.tasks, data.max_files);
                maxFiles = data.max_files;
                document.getElementById('notice').textContent = 
                    '最多保留 ' + maxFiles + ' 個文件，超出自動刪除最早的文件 / Max ' + maxFiles + ' files retained, oldest auto-deleted';
            } catch (e) {
                console.error(e);
            }
        }

        function renderTasks(tasks, max) {
            const container = document.getElementById('tasksList');
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<p class="empty">暫無下載任務 / No download tasks</p>';
                return;
            }

            let html = '<table class="task-table"><thead><tr><th>文件 / File</th><th>大小 / Size</th><th>時間 / Time</th><th>狀態 / Status</th><th>操作 / Action</th></tr></thead><tbody>';
            tasks.forEach(task => {
                const statusClass = task.status;
                const statusMap = {
                    'pending': '等待中 / Pending',
                    'downloading': '下載中 / Downloading',
                    'completed': '已完成 / Completed',
                    'failed': '失敗 / Failed'
                };
                const statusText = statusMap[task.status] || task.status;
                const fileName = task.file ? escapeHtml(task.file) : '-';
                const fileUrl = task.file ? '/downloads/' + encodeURIComponent(task.file) : '#';
                const size = task.size || '-';
                
                html += '<tr class="task-row">' +
                    '<td class="file-cell">' + (task.file ? '<a href="' + fileUrl + '" class="file-link" download>' + fileName + '</a>' : '-') + '</td>' +
                    '<td>' + size + '</td>' +
                    '<td>' + timeAgo(task.created_at) + '</td>' +
                    '<td><span class="status ' + statusClass + '">' + statusText + '</span></td>' +
                    '<td><button class="delete-btn" onclick="deleteTask(\'' + task.task_id + '\')">刪除 / Delete</button></td>' +
                '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchConfig();
            setInterval(refreshTasks, 2000);
            document.getElementById('urlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') startDownload();
            });
        });

        async function fetchConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                maxFiles = data.max_files || 50;
            } catch (e) {}
        }
    </script>
</body>
</html>
